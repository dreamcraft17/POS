name: ee_pos
publish_to: "none"

version: 1.0.1+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.5.0
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0
  intl: ^0.20.2
  blue_thermal_printer: ^1.2.3
  esc_pos_utils: ^1.1.0
  esc_pos_printer: ^4.1.0
  flutter_usb_thermal_plugin: ^0.0.1+1
  shared_preferences: ^2.5.3
  connectivity_plus: ^7.0.0
  flutter_launcher_icons: ^0.11.0
  file_picker: ^10.3.3
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.3.0
  image: ^3.3.0
  esc_pos_utils_plus: ^2.0.1+6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/logo.png       
    - assets/receipt/instagram_mono.png
    - assets/receipt/logo_bill.png    

flutter_icons:                      
  android: true
  ios: true
  image_path: "assets/icon/logo.png"
